version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: veda_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - veda_network

  # Mongo Express - MongoDB GUI Admin Interface
  mongo-express:
    image: mongo-express:latest
    container_name: veda_mongo_express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    networks:
      - veda_network

  # Redis Cache Store Service
  redis:
    image: redis:alpine
    container_name: veda_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - veda_network

  # Redis Commander - Redis GUI Web Admin
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: veda_redis_commander
    depends_on:
      - redis
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - veda_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  veda_network:
    driver: bridge
